name: "Architect HTML E2E (integration)"

# Heavy job: builds and starts a real Origam.Architect.Server (with an MSSQL
# LocalDB database and the model in model-tests/model) and runs the Playwright
# integration suite against it. The lightweight, backend-less smoke suite lives
# in architect-html-e2e.yml.

on:
  push:
    branches: [ master, 20* ]
  pull_request:
    branches: [ master, 20* ]

concurrency:
  group: architect-e2e-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-integration:
    name: architect-html-e2e-integration
    runs-on: windows-2025
    timeout-minutes: 45
    permissions:
      actions: read
      contents: read

    env:
      ARCHITECT_SERVER_URL: https://localhost:7099
      DB_CONNECTION: Data Source=(localdb)\MSSQLLocalDB;Initial Catalog=origam-demo;Integrated Security=True;Pooling=True;Encrypt=False

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack
        run: corepack enable

      - name: Prepare Yarn
        run: corepack prepare yarn@stable --activate
        shell: bash

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # --- Build the Architect Server -------------------------------------
      - name: Restore backend
        run: msbuild Origam.sln -t:restore /p:Configuration="Release Architect Server" -v:m
        working-directory: backend

      - name: Build Architect Server
        run: msbuild Origam.sln /t:"Architect\Origam_Architect_Server" /p:Configuration="Release Architect Server" -v:m
        working-directory: backend

      # Find the actual build output instead of hardcoding it, then expose the
      # absolute directory to the following steps via $GITHUB_ENV.
      - name: Locate built server
        shell: pwsh
        run: |
          # Find the runtime dll (always produced; the apphost .exe may not be).
          # Skip the ref-assembly copy and pick the most recently built one.
          $dll = Get-ChildItem -Path "backend/Origam.Architect.Server/bin" -Recurse -Filter "Origam.Architect.Server.dll" -ErrorAction SilentlyContinue |
                 Where-Object { $_.FullName -notmatch '\\ref\\' } |
                 Sort-Object LastWriteTime -Descending |
                 Select-Object -First 1
          if (-not $dll) {
            Write-Host "Contents under backend/Origam.Architect.Server/bin:"
            Get-ChildItem -Path "backend/Origam.Architect.Server/bin" -Recurse -ErrorAction SilentlyContinue | Select-Object -ExpandProperty FullName
            throw "Origam.Architect.Server.dll not found"
          }
          $dir = $dll.Directory.FullName
          Write-Host "Server build dir: $dir"
          "SERVER_DIR=$dir"            | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "SERVER_DLL=$($dll.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      # --- Database -------------------------------------------------------
      - name: Start SQL Server LocalDB
        shell: pwsh
        run: |
          SqlLocalDB create MSSQLLocalDB 2>$null
          SqlLocalDB start MSSQLLocalDB
          sqlcmd -S "(localdb)\MSSQLLocalDB" -Q "IF DB_ID('origam-demo') IS NULL CREATE DATABASE [origam-demo];"
          sqlcmd -S "(localdb)\MSSQLLocalDB" -Q "SELECT name FROM sys.databases;"

      # --- Server runtime configuration -----------------------------------
      - name: Write OrigamSettings.config
        shell: pwsh
        run: |
          $dir = $env:SERVER_DIR
          Write-Host "Writing server config to: $dir"
          if (-not (Test-Path $dir)) { throw "Server build dir not found: $dir" }
          $model = Join-Path $env:GITHUB_WORKSPACE 'model-tests\model'
          $config = @"
          <?xml version="1.0" encoding="UTF-8"?>
          <OrigamSettings>
            <xmlSerializerSection type="Origam.OrigamSettingsCollection, Origam, Version=1.0.0.0, Culture=neutral, PublicKeyToken=null">
              <ArrayOfOrigamSettings xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xmlns:xsd="http://www.w3.org/2001/XMLSchema">
                <OrigamSettings>
                  <ModelSourceControlLocation>$model</ModelSourceControlLocation>
                  <DataConnectionString>$env:DB_CONNECTION</DataConnectionString>
                  <SchemaDataService>Origam.DA.Service.MsSqlDataService, Origam.DA.Service</SchemaDataService>
                  <DataDataService>Origam.DA.Service.MsSqlDataService, Origam.DA.Service</DataDataService>
                  <SQLReportServiceTimeout>60000</SQLReportServiceTimeout>
                  <GUIExcelExportFormat>XLS</GUIExcelExportFormat>
                  <DefaultSchemaExtensionId>f17329d6-3143-420a-a2e6-30e431eea51d</DefaultSchemaExtensionId>
                  <ExtraSchemaExtensionId>00000000-0000-0000-0000-000000000000</ExtraSchemaExtensionId>
                  <TitleText>Demo</TitleText>
                  <Name>Demo</Name>
                  <DataServiceSelectTimeout>120</DataServiceSelectTimeout>
                  <AuthorizationProvider>Origam.Security.OrigamDatabaseAuthorizationProvider, Origam.Security</AuthorizationProvider>
                  <ProfileProvider>Origam.Security.OrigamProfileProvider, Origam.Security</ProfileProvider>
                  <LoadExternalWorkQueues>false</LoadExternalWorkQueues>
                  <ExternalWorkQueueCheckPeriod>180</ExternalWorkQueueCheckPeriod>
                  <TraceEnabled>true</TraceEnabled>
                  <ModelProvider>Origam.OrigamEngine.FilePersistenceBuilder, Origam.OrigamEngine</ModelProvider>
                </OrigamSettings>
              </ArrayOfOrigamSettings>
            </xmlSerializerSection>
          </OrigamSettings>
          "@
          $config | Out-File -FilePath (Join-Path $dir 'OrigamSettings.config') -Encoding utf8
          # The SPA path only needs to exist; the frontend itself is served by Vite.
          '{ "SpaConfig": { "PathToClientApplication": "' + ($env:GITHUB_WORKSPACE -replace '\\','/') + '/architect-html" } }' |
            Out-File -FilePath (Join-Path $dir 'appsettings.json') -Encoding utf8
          Write-Host "Wrote OrigamSettings.config and appsettings.json"

          # log4net.config / OrigamSettings.config are gitignored (generated from
          # templates locally), so they aren't in a fresh checkout. Build the
          # log4net.config the server reads on startup from the committed template.
          $src = 'backend/Origam.Architect.Server'
          Copy-Item (Join-Path $src 'ConfigTemplates/_log4net.config') -Destination (Join-Path $dir 'log4net.config') -Force
          if (Test-Path (Join-Path $src 'Assets')) {
            Copy-Item (Join-Path $src 'Assets') -Destination $dir -Recurse -Force
          }
          Write-Host "Staged log4net.config and Assets"

      - name: Trust ASP.NET dev HTTPS certificate
        run: dotnet dev-certs https

      # Playwright itself starts the server (via ARCHITECT_SERVER_CMD below) and
      # keeps it alive for the whole run, so we don't start it in a separate
      # step (background processes don't reliably survive between steps).

      # --- Frontend + tests ------------------------------------------------
      - name: Install frontend dependencies
        run: yarn install --immutable
        working-directory: architect-html

      - name: Install Playwright browser
        run: yarn playwright install chromium
        working-directory: architect-html

      - name: Run integration tests
        env:
          CI: true
          # Let Playwright launch the server it built (Release dll via the .NET
          # host) with the build dir as its working dir / content root.
          ARCHITECT_SERVER_CMD: 'dotnet "${{ env.SERVER_DLL }}" --urls "https://localhost:7099;http://localhost:5003"'
          ARCHITECT_SERVER_CWD: ${{ env.SERVER_DIR }}
        run: yarn test:e2e:integration
        working-directory: architect-html

      # --- Artifacts -------------------------------------------------------
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-integration-report
          path: architect-html/playwright-report
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Playwright test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-integration-test-results
          path: architect-html/test-results
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Architect Server logs
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: architect-server-logs
          path: ${{ env.SERVER_DIR }}/logs
          retention-days: 7
          if-no-files-found: ignore
