name: "Architect HTML E2E"

on:
  push:
    branches: [ master, 20* ]
  pull_request:
    branches: [ master, 20* ]

jobs:
  e2e:
    name: architect-html-e2e
    runs-on: windows-2025
    permissions:
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        node-version: [ 22.x ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack
        run: corepack enable

      - name: Prepare Yarn
        run: corepack prepare yarn@stable --activate
        shell: bash

      - name: Log versions
        run: |
          yarn --version
          node --version
        shell: bash

      - name: Install dependencies
        run: |
          cd architect-html
          yarn install --immutable
        shell: bash

      - name: Install Playwright browsers
        run: |
          cd architect-html
          yarn playwright install chromium
        shell: bash

      - name: Run e2e tests
        env:
          CI: true
        run: |
          cd architect-html
          yarn test:e2e
        shell: bash

      # The HTML report embeds the traces; download it and run
      # `npx playwright show-report <dir>` to browse failures and open traces.
      - name: Upload Playwright HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: architect-html/playwright-report
          retention-days: 7
          if-no-files-found: ignore

      # Raw trace.zip / video / screenshots for `npx playwright show-trace`.
      - name: Upload Playwright test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: architect-html/test-results
          retention-days: 7
          if-no-files-found: ignore
